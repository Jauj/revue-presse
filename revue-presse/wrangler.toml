name = "revue-presse"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# === CRON TRIGGER (pipeline complet séquentiel) ===
# Un seul cron lance les 8 phases enchaînées.
# Nécessite Workers Paid ($5/mois) pour le temps d'exécution (15 min).
# Sur le plan gratuit, utiliser POST /trigger/all manuellement.
[triggers]
crons = ["0 6 * * 1-5"]

# === KV Namespace (bus inter-phases) ===
[[kv_namespaces]]
binding = "CACHE"
id = "ef1ef185628f45d9bc6f9d5c209b0efe"

# === Variables d'environnement ===
[vars]
DESTINATION_EMAIL = "ferrierjonas@gmail.com"
TIMEZONE = "Europe/Paris"
MAX_ARTICLES = "50"
MAX_WORDS_PER_ARTICLE = "1500"
AI_PROVIDER = "auto"
PUBLIC_URL = "https://revue-presse.jeanneaj.workers.dev"

# === Workers AI (fallback natif) ===
[ai]
binding = "AI"